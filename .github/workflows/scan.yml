name: Börsvakt

on:
  schedule:
    # Var 15:e minut, vardagar. 06–21 UTC täcker både Stockholmsbörsen
    # (09:00–17:30 sv. tid, sommar- och vintertid) och USA (15:30–22:00 sv. tid).
    # Skriptet själv avgör vilka marknader som är öppna.
    - cron: "*/15 6-21 * * 1-5"
  workflow_dispatch: {}   # gör att du kan trigga manuellt i GitHub-gränssnittet

permissions:
  contents: write   # behövs för att spara state.json tillbaka till repot

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Kör skannern
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scanner.py

      - name: Insiderbevakning (SEC EDGAR)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python insiders.py

      - name: Spara state (dubblettskydd mellan körningar)
        run: |
          git config user.name "borsvakt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "state: $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
