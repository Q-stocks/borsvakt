name: Börsvakt

on:
  schedule:
    # Var 15:e minut, vardagar. 04–22 UTC täcker pingerns fönster (06:00–21:45
    # svensk tid) OCH USA-sessionens sista timme (stänger 20:00/21:00 UTC
    # sommar/vinter). Skriptet själv avgör vilka marknader som är öppna.
    # OBS: GitHub stryper högfrekventa cron på lågaktivitetsrepo – schemat firar
    # i praktiken bara några gånger/dag. Den externa pingern (workflow_dispatch
    # via API) ger pålitlig 15-min-kadens, se PINGER.md. Cron kvar som gratis
    # backup-hjärtslag: den driver också schemavakten (watchdog.py) om pingern dör.
    - cron: "*/15 4-22 * * 1-5"
  workflow_dispatch: {}   # manuell trigg + extern pinger via API

permissions:
  contents: write   # behövs för att spara state.json tillbaka till repot
  actions: write    # schemavakten (watchdog.py) dispatchar daily/monthly när GitHubs cron missar

concurrency:
  group: borsvakt-state          # serialisera scan/daily/monthly så state-push aldrig krockar
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Körs FÖRE pip install (stdlib-only): GitHubs cron är opålitlig på det
      # här repot, så vakten dispatchar daily/monthly om de inte körts i tid.
      - name: Schemavakt – dispatcha daily/monthly om GitHubs cron missat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python watchdog.py

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Kör skannern
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scanner.py

      - name: Spara state (dubblettskydd mellan körningar)
        if: always()   # levererade larms dedup-markeringar får inte tappas för att ett senare steg felar
        run: |
          git config user.name "borsvakt-bot"
          git config user.email "bot@users.noreply.github.com"
          # log/ MÅSTE med: scanner loggar volym-/move-/nivålarm till alertlog-
          # facit (log/alerts.csv) – utan detta kastas raderna efter varje körning.
          git add state.json log/ 2>/dev/null || true
          if git diff --cached --quiet; then echo "Inget att spara."; exit 0; fi
          git commit -m "state: $(date -u +%Y-%m-%dT%H:%M)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash -X theirs && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            echo "Push-försök $i misslyckades (remote flyttade) – nytt försök om 5s." >&2
            sleep 5
          done
          echo "Kunde inte pusha state efter 5 försök." >&2
          exit 1
