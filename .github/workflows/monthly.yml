name: Börsvakt – månadssignaler

on:
  # INGEN egen cron: GitHubs schemaläggare missade/försenade månadskörningen
  # (2026-07-01 uteblev den tills manuell trigg; cronen firade sedan 16:08 och
  # gav en dubbelkörning). Schemavakten (watchdog.py i scan.yml) dispatchar i
  # stället månadssignalerna vid första scan-körningen efter 06:15 UTC den 1:a
  # (eller första vardagen därefter) om ingen lyckad körning finns för månaden.
  # Deterministiskt, utan dubbelkörningar.
  workflow_dispatch: {}

permissions:
  contents: write   # Aktiemotorn sparar portföljen i state.json

concurrency:
  group: borsvakt-state          # serialisera scan/daily/monthly så state-push aldrig krockar
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Tillgångssignal (dual momentum, modul 1)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python momentum.py

      - name: Aktiemotorn (modul 3)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stocks.py

      - name: Multifaktor (modul 6)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python multifactor.py

      - name: Trendföljning (modul 7)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trend.py

      - name: Sektorrotation (modul 9)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sectors.py

      - name: Regimläge (modul 10)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python regime.py

      - name: Larmlogg – månadens scorecard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python alertlog.py evaluate
          python alertlog.py report

      - name: Generera dashboard
        run: python dashboard.py

      - name: Spara state (portfölj + dubblettskydd)
        if: always()   # levererade larms dedup-markeringar får inte tappas för att ett senare steg felar
        run: |
          git config user.name "borsvakt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json log/ docs/ holdings.csv 2>/dev/null || true
          if git diff --cached --quiet; then echo "Inget att spara."; exit 0; fi
          git commit -m "state: månadssignal $(date -u +%Y-%m)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash -X theirs && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            echo "Push-försök $i misslyckades (remote flyttade) – nytt försök om 5s." >&2
            sleep 5
          done
          echo "Kunde inte pusha state efter 5 försök." >&2
          exit 1
